version: "3.9"

services:
  backend:
    build:
      context: ./backend
      target: development
    container_name: belfast-sentinel-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
    networks:
      - belfast-sentinel-network

  frontend:
    build:
      context: ./frontend
      target: development
      args:
        - REACT_APP_API_URL=http://localhost:8000
    container_name: belfast-sentinel-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_MAPBOX_TOKEN=${REACT_APP_MAPBOX_TOKEN:-}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    networks:
      - belfast-sentinel-network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: belfast-sentinel-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - belfast-sentinel-network
    depends_on:
      - backend
      - frontend
    profiles:
      - production

networks:
  belfast-sentinel-network:
    driver: bridge
